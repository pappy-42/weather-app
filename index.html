<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Monitor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Lucide icons as SVG components
        const Thermometer = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/>
            </svg>
        );

        const Droplets = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/>
                <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/>
            </svg>
        );

        const MapPin = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/>
                <circle cx="12" cy="10" r="3"/>
            </svg>
        );

        const RefreshCw = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                <path d="M21 3v5h-5"/>
                <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                <path d="M8 16H3v5"/>
            </svg>
        );

        function TempHumidityMonitor() {
            const [temperatureC, setTemperatureC] = useState(null);
            const [humidity, setHumidity] = useState(null);
            const [useFahrenheit, setUseFahrenheit] = useState(true);
            const [location, setLocation] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [lastUpdate, setLastUpdate] = useState(null);

            const fetchWeatherData = async () => {
                setLoading(true);
                setError(null);
                
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    
                    const { latitude, longitude } = position.coords;
                    
                    const response = await fetch(
                        `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m&temperature_unit=celsius&timezone=auto`
                    );
                    
                    if (!response.ok) throw new Error('Failed to fetch weather data');
                    
                    const data = await response.json();
                    
                    setTemperatureC(data.current.temperature_2m);
                    setHumidity(data.current.relative_humidity_2m);
                    setLocation({ latitude, longitude });
                    setLastUpdate(new Date());
                    setLoading(false);
                } catch (err) {
                    setError(err.message === 'User denied Geolocation' 
                        ? 'Location permission denied. Please enable location access.'
                        : 'Failed to fetch weather data. Please try again.');
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchWeatherData();
            }, []);

            const celsiusToFahrenheit = (celsius) => (celsius * 9/5) + 32;
            
            const displayTemp = temperatureC !== null 
                ? (useFahrenheit ? celsiusToFahrenheit(temperatureC) : temperatureC)
                : null;
            const tempUnit = useFahrenheit ? '°F' : '°C';

            const getComfortLevel = (temp, humid) => {
                if (temp >= 20 && temp <= 24 && humid >= 40 && humid <= 60) {
                    return { text: 'Comfortable', color: 'text-green-600' };
                } else if (temp < 18 || temp > 26 || humid < 30 || humid > 70) {
                    return { text: 'Uncomfortable', color: 'text-red-600' };
                }
                return { text: 'Moderate', color: 'text-yellow-600' };
            };

            const comfort = temperatureC !== null && humidity !== null 
                ? getComfortLevel(temperatureC, humidity)
                : { text: '-', color: 'text-gray-400' };

            const getTempBarWidth = () => {
                if (displayTemp === null) return 0;
                if (useFahrenheit) {
                    return Math.min(100, Math.max(0, ((displayTemp - 14) / 90) * 100));
                } else {
                    return Math.min(100, Math.max(0, ((displayTemp + 10) / 50) * 100));
                }
            };

            if (loading) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-6">
                        <div className="text-center">
                            <div className="animate-spin rounded-full h-16 w-16 border-b-2 border-blue-600 mx-auto mb-4"></div>
                            <p className="text-gray-600">Fetching weather data...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-6">
                        <div className="bg-white rounded-3xl shadow-xl p-8 max-w-md text-center">
                            <div className="text-red-500 text-5xl mb-4">⚠️</div>
                            <h2 className="text-xl font-bold text-gray-900 mb-2">Unable to Load Data</h2>
                            <p className="text-gray-600 mb-6">{error}</p>
                            <button
                                onClick={fetchWeatherData}
                                className="bg-blue-600 text-white px-6 py-3 rounded-full font-medium hover:bg-blue-700 transition-colors"
                            >
                                Try Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50 flex items-center justify-center p-6">
                    <div className="w-full max-w-md">
                        <div className="flex items-center justify-between mb-8">
                            <h1 className="text-3xl font-bold text-gray-900">
                                Climate Monitor
                            </h1>
                            <button
                                onClick={fetchWeatherData}
                                className="p-2 bg-white rounded-full shadow-md hover:shadow-lg transition-shadow"
                                title="Refresh data"
                            >
                                <RefreshCw />
                            </button>
                        </div>

                        <div className="bg-white rounded-3xl shadow-xl p-8 mb-6">
                            <div className="mb-8">
                                <div className="flex items-center justify-center gap-3 mb-4">
                                    <div className="p-3 bg-orange-100 rounded-full">
                                        <Thermometer />
                                    </div>
                                    <h2 className="text-xl font-semibold text-gray-700">Temperature</h2>
                                </div>
                                
                                <div className="flex justify-center mb-4">
                                    <div className="bg-gray-100 rounded-full p-1 flex gap-1">
                                        <button
                                            onClick={() => setUseFahrenheit(false)}
                                            className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                                                !useFahrenheit 
                                                    ? 'bg-white text-gray-900 shadow-sm' 
                                                    : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            °C
                                        </button>
                                        <button
                                            onClick={() => setUseFahrenheit(true)}
                                            className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${
                                                useFahrenheit 
                                                    ? 'bg-white text-gray-900 shadow-sm' 
                                                    : 'text-gray-600 hover:text-gray-900'
                                            }`}
                                        >
                                            °F
                                        </button>
                                    </div>
                                </div>

                                <div className="text-center">
                                    <p className="text-6xl font-bold text-gray-900 mb-2">
                                        {displayTemp !== null ? displayTemp.toFixed(1) : '--'}{tempUnit}
                                    </p>
                                    <p className="text-gray-500">{useFahrenheit ? 'Fahrenheit' : 'Celsius'}</p>
                                </div>
                                <div className="mt-6 h-3 bg-gray-100 rounded-full overflow-hidden">
                                    <div 
                                        className="h-full bg-gradient-to-r from-blue-400 via-orange-400 to-red-500 transition-all duration-300"
                                        style={{ width: `${getTempBarWidth()}%` }}
                                    />
                                </div>
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                    {useFahrenheit ? (
                                        <>
                                            <span>14°F</span>
                                            <span>104°F</span>
                                        </>
                                    ) : (
                                        <>
                                            <span>-10°C</span>
                                            <span>40°C</span>
                                        </>
                                    )}
                                </div>
                            </div>

                            <div className="border-t border-gray-200 my-6" />

                            <div>
                                <div className="flex items-center justify-center gap-3 mb-4">
                                    <div className="p-3 bg-blue-100 rounded-full">
                                        <Droplets />
                                    </div>
                                    <h2 className="text-xl font-semibold text-gray-700">Humidity</h2>
                                </div>
                                <div className="text-center">
                                    <p className="text-6xl font-bold text-gray-900 mb-2">
                                        {humidity !== null ? humidity.toFixed(0) : '--'}%
                                    </p>
                                    <p className="text-gray-500">Relative Humidity</p>
                                </div>
                                <div className="mt-6 h-3 bg-gray-100 rounded-full overflow-hidden">
                                    <div 
                                        className="h-full bg-gradient-to-r from-yellow-300 via-blue-400 to-blue-600 transition-all duration-300"
                                        style={{ width: `${humidity || 0}%` }}
                                    />
                                </div>
                                <div className="flex justify-between text-xs text-gray-400 mt-1">
                                    <span>0%</span>
                                    <span>100%</span>
                                </div>
                            </div>
                        </div>

                        <div className="bg-white rounded-2xl shadow-lg p-6 text-center mb-4">
                            <p className="text-sm text-gray-600 mb-2">Comfort Level</p>
                            <p className={`text-2xl font-bold ${comfort.color}`}>{comfort.text}</p>
                        </div>

                        {location && lastUpdate && (
                            <div className="bg-white rounded-2xl shadow-lg p-4">
                                <div className="flex items-center justify-center gap-2 text-sm text-gray-600 mb-2">
                                    <MapPin />
                                    <span>Your Location</span>
                                </div>
                                <p className="text-xs text-gray-500 text-center">
                                    Last updated: {lastUpdate.toLocaleTimeString()}
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<TempHumidityMonitor />, document.getElementById('root'));
    </script>
</body>
</html>
